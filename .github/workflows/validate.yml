name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  schema-check:
    name: Schema Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install jsonschema

      - name: Validate DISCOVER output (requirements.json)
        run: python scripts/validate.py schemas/requirements.schema.json output/requirements.json

      - name: Validate PLAN output (learning-plan.json)
        run: python scripts/validate.py schemas/learning-plan.schema.json output/learning-plan.json

  structure-check:
    name: Course Structure Integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check every lesson has required files
        run: |
          errors=0
          for day in course/lesson*; do
            if [ ! -f "$day/README.md" ]; then echo "❌ $day missing README.md"; errors=$((errors+1)); fi
            if [ ! -f "$day/notes.md" ]; then echo "❌ $day missing notes.md"; errors=$((errors+1)); fi
            practice_count=$(ls "$day/in_class/practice"*.py 2>/dev/null | wc -l)
            if [ "$practice_count" -ne 6 ]; then echo "❌ $day has $practice_count practice files (expected 6)"; errors=$((errors+1)); fi
            task_count=$(ls "$day/homework/task"*.py 2>/dev/null | wc -l)
            if [ "$task_count" -ne 3 ]; then echo "❌ $day has $task_count task files (expected 3)"; errors=$((errors+1)); fi
          done
          if [ "$errors" -gt 0 ]; then echo ""; echo "Total errors: $errors"; exit 1; fi
          echo "✅ All lessons have correct structure (README + notes + 6 practice + 3 task)"

      - name: Check exercise file headers
        run: |
          errors=0
          for f in course/lesson*/in_class/practice*.py course/lesson*/homework/task*.py; do
            if ! grep -q '难度:' "$f"; then echo "❌ $f missing 难度"; errors=$((errors+1)); fi
            if ! grep -q '所属知识点:' "$f"; then echo "❌ $f missing 所属知识点"; errors=$((errors+1)); fi
          done
          if [ "$errors" -gt 0 ]; then echo ""; echo "Total errors: $errors"; exit 1; fi
          echo "✅ All exercise files have correct headers"
